name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_LOG: warn

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: cargo check
        working-directory: backend
        run: cargo check --workspace --all-targets

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        working-directory: backend
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: cargo clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: Jungle_test
          POSTGRES_USER: Jungle
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U Jungle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
    env:
      DATABASE_URL: postgres://Jungle:test_password@localhost:5432/Jungle_test
      REDIS_URL: redis://127.0.0.1:6379
      NATS_URL: nats://127.0.0.1:4222
      JWT_SECRET: test-jwt-secret-ci
      JWT_REFRESH_SECRET: test-refresh-secret-ci
      INTERNAL_SERVICE_KEY: test-internal-key
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Run migrations
        working-directory: backend
        run: |
          cargo install sqlx-cli --no-default-features --features postgres || true
          sqlx database create
          sqlx migrate run --source migrations
      - name: cargo test
        working-directory: backend
        run: cargo test --workspace

  frontend:
    name: Frontend Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: frontend
        run: pnpm -r run typecheck
      - name: Lint
        working-directory: frontend
        run: pnpm -r run lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, fmt, clippy, test, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build & push backend
        working-directory: backend
        run: |
          TAG="${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}"
          docker build -t ${{ vars.REGISTRY_URL }}/Jungle-backend:${TAG} .
          docker push ${{ vars.REGISTRY_URL }}/Jungle-backend:${TAG}
      - name: Build & push frontend
        working-directory: frontend
        run: |
          TAG="${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}"
          docker build -f apps/web/Dockerfile -t ${{ vars.REGISTRY_URL }}/Jungle-web:${TAG} .
          docker push ${{ vars.REGISTRY_URL }}/Jungle-web:${TAG}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # SSH deploy or kubectl apply or docker-compose pull+up
          # ssh ${{ secrets.STAGING_HOST }} "cd /opt/Jungle && docker compose pull && docker compose up -d"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Run database migrations
        run: |
          echo "Running migrations on production DB..."
          # sqlx migrate run --source backend/migrations --database-url ${{ secrets.PROD_DATABASE_URL }}
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # ssh ${{ secrets.PROD_HOST }} "cd /opt/Jungle && docker compose pull && docker compose up -d"
      - name: Health check
        run: |
          echo "Checking health endpoints..."
          # curl -sf ${{ vars.PRODUCTION_URL }}/api/health || (echo "Health check failed!" && exit 1)
