name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_LOG: warn

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: cargo check
        working-directory: backend
        run: cargo check --workspace --all-targets

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        working-directory: backend
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: cargo clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wowonder_test
          POSTGRES_USER: wowonder
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U wowonder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
    env:
      DATABASE_URL: postgres://wowonder:test_password@localhost:5432/wowonder_test
      REDIS_URL: redis://127.0.0.1:6379
      NATS_URL: nats://127.0.0.1:4222
      JWT_SECRET: test-jwt-secret-ci
      JWT_REFRESH_SECRET: test-refresh-secret-ci
      INTERNAL_SERVICE_KEY: test-internal-key
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Run migrations
        working-directory: backend
        run: |
          cargo install sqlx-cli --no-default-features --features postgres || true
          sqlx database create
          sqlx migrate run --source migrations
      - name: cargo test
        working-directory: backend
        run: cargo test --workspace

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, fmt, clippy]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        working-directory: backend
        run: docker build --target builder -t wowonder-backend:ci .
