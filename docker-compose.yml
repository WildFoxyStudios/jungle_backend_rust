x-common-env: &common-env
  # Use external DB (e.g. Neon) from backend/.env
  DATABASE_URL: ${DATABASE_URL}
  # Migrations are applied explicitly via `sqlx migrate run`.
  # Keep service startup fast/stable with Neon connection pooling.
  SKIP_DB_MIGRATIONS: "true"
  # Use external Redis from .env if set, otherwise local container
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  JWT_SECRET: ${JWT_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
  NATS_URL: nats://nats:4222
  RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
  SQLX_OFFLINE: "true"
  # External APIs (from .env)
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
  OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
  CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
  CLOUDFLARE_AI_TOKEN: ${CLOUDFLARE_AI_TOKEN:-}
  CLOUDFLARE_AI_WHISPER_MODEL: ${CLOUDFLARE_AI_WHISPER_MODEL:-@cf/openai/whisper}
  # Email
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-starttls}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@jungle.com}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Jungle}
  # Web Push
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@jungle.com}
  # Anti-abuse
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
  # Payments
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  # Storage (R2 for prod, minio for local dev)
  STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
  S3_ENDPOINT: ${S3_ENDPOINT:-https://89ae9dc46bb0bd6c1686a28cefed9a9d.r2.cloudflarestorage.com}
  S3_BUCKET: ${S3_BUCKET:-jungle}
  S3_REGION: ${S3_REGION:-auto}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-0f0d97ce565572653b26309c5d4dcd20}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-1775cf3b88e518f4324779f18b35dd10b24f85cca356a97c5c4e4b806ff965b0}
  S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://pub-72b1819b1e104dde8013bd70857419f8.r2.dev}

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    nats:
      condition: service_healthy

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    environment:
      POSTGRES_DB: Jungle
      POSTGRES_USER: Jungle
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Jungle_dev_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Jungle"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # Local Redis for development only — production uses REDIS_URL env var (Redis Cloud)
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["dev"]  # Only start with: docker compose --profile dev up
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    # NATS monitoring (8222) is internal-only — never exposed to host
    command: ["--js", "--sd", "/data", "--http_port", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    profiles: ["dev"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── API Gateway (public entry point) ───────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    command: ["api-gateway"]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      <<: *common-env
      SERVER_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      POST_SERVICE_URL: http://post-service:3003
      MESSAGING_SERVICE_URL: http://messaging-service:3004
      MEDIA_SERVICE_URL: http://media-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      GROUP_PAGE_SERVICE_URL: http://group-page-service:3007
      CONTENT_SERVICE_URL: http://content-service:3008
      COMMERCE_SERVICE_URL: http://commerce-service:3009
      ADMIN_SERVICE_URL: http://admin-service:3010
      PAYMENT_SERVICE_URL: http://payment-service:3011
      REALTIME_SERVICE_URL: http://realtime-service:3012
      AI_SERVICE_URL: http://ai-service:3013
      LIVE_SERVICE_URL: http://live-service:3014

  # ── Microservices ──────────────────────────────────────────────────────────
  auth-service:
    <<: *service-defaults
    command: ["auth-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3001"

  user-service:
    <<: *service-defaults
    command: ["user-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3002"

  post-service:
    <<: *service-defaults
    command: ["post-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3003"

  messaging-service:
    <<: *service-defaults
    command: ["messaging-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3004"

  media-service:
    <<: *service-defaults
    command: ["media-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3005"

  notification-service:
    <<: *service-defaults
    command: ["notification-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3006"

  group-page-service:
    <<: *service-defaults
    command: ["group-page-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3007"

  content-service:
    <<: *service-defaults
    command: ["content-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3008"

  commerce-service:
    <<: *service-defaults
    command: ["commerce-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3009"

  admin-service:
    <<: *service-defaults
    command: ["admin-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3010"

  payment-service:
    <<: *service-defaults
    command: ["payment-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3011"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-}
      PAYPAL_SANDBOX: ${PAYPAL_SANDBOX:-true}

  realtime-service:
    <<: *service-defaults
    command: ["realtime-service"]
    ports:
      - "${REALTIME_PORT:-3012}:3012"
    environment:
      <<: *common-env
      SERVER_PORT: "3012"

  ai-service:
    <<: *service-defaults
    command: ["ai-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3013"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-dall-e-3}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-imagen-3.0-generate-001}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-change-me-internal-key}

  live-service:
    <<: *service-defaults
    command: ["live-service"]
    environment:
      <<: *common-env
      SERVER_PORT: "3014"

  # ── Background Jobs ────────────────────────────────────────────────────────
  jobs-runner:
    <<: *service-defaults
    command: ["jobs-runner"]
    environment:
      <<: *common-env

volumes:
  pgdata:
  natsdata:
  miniodata:
